<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notch — Sign in</title>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="nf-auth">
      <h1>Notch</h1>
      <p class="nf-lead">Account for synced reviews</p>
      <div id="nf-config-warn" class="nf-banner" hidden>
        Supabase is not configured yet. Add your <strong>anon</strong> key to
        <code>src/supabase-config.js</code>, run <code>npm run build</code>, and reload this extension in
        <code>chrome://extensions</code>.
      </div>
      <div id="nf-signed-out-wrap">
        <div class="nf-actions nf-actions-stack">
          <button type="button" id="nf-google-sign-in" class="nf-btn nf-btn-primary nf-btn-google">
            Continue with Google
          </button>
        </div>
        <div class="nf-or-wrap" aria-hidden="true">
          <span class="nf-or-line"></span>
          <span class="nf-or-label">or</span>
          <span class="nf-or-line"></span>
        </div>
        <div id="nf-auth-fields" class="nf-auth-fields">
          <label class="nf-label" for="nf-email">Email</label>
          <input id="nf-email" class="nf-input" type="email" autocomplete="username" />
        </div>
        <div class="nf-actions">
          <button type="button" id="nf-send-magic-link" class="nf-btn">Send magic link</button>
        </div>
      </div>
      <button type="button" id="nf-sign-out" class="nf-btn" hidden>Sign out</button>
      <p id="nf-status" class="nf-auth-status" aria-live="polite"></p>
    </main>
    <script src="auth-page.js"></script>
  </body>
</html>
