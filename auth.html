<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notch — Sign in</title>
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <main class="nf-auth">
      <h1>Notch</h1>
      <p class="nf-lead">Account for synced reviews</p>
      <div id="nf-config-warn" class="nf-banner" hidden>
        Supabase is not configured yet. Add your <strong>anon</strong> key to
        <code>src/supabase-config.js</code>, run <code>npm run build</code>, and reload this extension in
        <code>chrome://extensions</code>.
      </div>
      <div id="nf-signed-out-wrap">
        <div class="nf-tabs" role="tablist" aria-label="Account">
          <button
            type="button"
            id="nf-tab-sign-in"
            class="nf-tab nf-tab-active"
            role="tab"
            aria-selected="true"
            aria-controls="nf-auth-fields"
          >
            Log in
          </button>
          <button
            type="button"
            id="nf-tab-sign-up"
            class="nf-tab"
            role="tab"
            aria-selected="false"
            aria-controls="nf-auth-fields"
          >
            Sign up
          </button>
        </div>
        <div id="nf-auth-fields" class="nf-auth-fields" role="tabpanel" aria-labelledby="nf-tab-sign-in">
          <label class="nf-label" for="nf-email">Email</label>
          <input id="nf-email" class="nf-input" type="email" autocomplete="username" />
          <label class="nf-label" for="nf-password">Password</label>
          <input id="nf-password" class="nf-input" type="password" autocomplete="current-password" />
          <div id="nf-signup-only" class="nf-signup-only" hidden>
            <label class="nf-label" for="nf-password-confirm">Confirm password</label>
            <input
              id="nf-password-confirm"
              class="nf-input"
              type="password"
              autocomplete="new-password"
            />
          </div>
        </div>
        <div class="nf-actions">
          <button type="button" id="nf-sign-in" class="nf-btn nf-btn-primary">Sign in</button>
          <button type="button" id="nf-sign-up" class="nf-btn nf-btn-primary" hidden>Create account</button>
        </div>
      </div>
      <button type="button" id="nf-sign-out" class="nf-btn" hidden>Sign out</button>
      <p id="nf-status" class="nf-auth-status" aria-live="polite"></p>
    </main>
    <script src="auth-page.js"></script>
  </body>
</html>
